services:
  # ── Backend: Flask + TensorFlow ─────────────────────────────────────────
  - type: web
    name: ai-digit-recognizer-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 120 "app:create_app()"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── Frontend: React + Vite ───────────────────────────────────────────────
  - type: web
    name: ai-digit-recognizer-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ai-digit-recognizer-backend.onrender.com
